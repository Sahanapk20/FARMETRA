<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Prediction System</title>
    <style>
        :root {
            --primary-green: #2ecc71;
            --dark-green: #27ae60;
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
            --card-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 600px;
            transition: transform 0.3s ease;
        }
        h1 {
            color: var(--dark-green);
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .full-width {
            grid-column: span 2;
        }
        label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }
        input {
            padding: 12px;
            border: 2px solid #edf2f7;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.2s;
            background-color: #f8fafc;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-green);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.15);
        }
        button {
            background: linear-gradient(to right, var(--primary-green), var(--dark-green));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        #result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            display: none;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .success {
            background-color: #ecfdf5;
            border: 2px solid #10b981;
            color: #065f46;
        }
        .error {
            background-color: #fef2f2;
            border: 2px solid #ef4444;
            color: #991b1b;
        }
        .result-title {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            opacity: 0.8;
        }
        .predicted-crop {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            color: var(--dark-green);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌾 Crop Advisor AI</h1>
        <form id="predictionForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="N">Nitrogen (N)</label>
                    <input type="number" id="N" step="any" placeholder="e.g. 90" required>
                </div>
                <div class="form-group">
                    <label for="P">Phosphorus (P)</label>
                    <input type="number" id="P" step="any" placeholder="e.g. 42" required>
                </div>
                <div class="form-group">
                    <label for="K">Potassium (K)</label>
                    <input type="number" id="K" step="any" placeholder="e.g. 43" required>
                </div>
                <div class="form-group">
                    <label for="temperature">Temp (°C)</label>
                    <input type="number" id="temperature" step="any" placeholder="e.g. 20.8" required>
                </div>
                <div class="form-group">
                    <label for="humidity">Humidity (%)</label>
                    <input type="number" id="humidity" step="any" placeholder="e.g. 82" required>
                </div>
                <div class="form-group">
                    <label for="ph">Soil pH</label>
                    <input type="number" id="ph" step="any" placeholder="e.g. 6.5" required>
                </div>
                <div class="form-group full-width">
                    <label for="rainfall">Rainfall (mm)</label>
                    <input type="number" id="rainfall" step="any" placeholder="e.g. 202.9" required>
                </div>
            </div>
            <button type="submit">Predict Recommended Crop</button>
        </form>

        <div id="result"></div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            const submitBtn = e.target.querySelector('button');
            
            resultDiv.style.display = 'none';
            submitBtn.innerText = 'Analyzing...';
            submitBtn.disabled = true;
            
            const data = {
                N: document.getElementById('N').value,
                P: document.getElementById('P').value,
                K: document.getElementById('K').value,
                temperature: document.getElementById('temperature').value,
                humidity: document.getElementById('humidity').value,
                ph: document.getElementById('ph').value,
                rainfall: document.getElementById('rainfall').value
            };

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `
                        <div class="result-title">Optimal Crop</div>
                        <p class="predicted-crop">${result.prediction}</p>
                    `;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerText = result.error || 'Prediction analysis failed.';
                }
            } catch (err) {
                resultDiv.className = 'error';
                resultDiv.innerText = 'Unable to connect to server. Ensure Flask is running.';
            } finally {
                submitBtn.innerText = 'Predict Recommended Crop';
                submitBtn.disabled = false;
                resultDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
